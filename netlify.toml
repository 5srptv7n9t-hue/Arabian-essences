# ============================================================
#  Configuración de Netlify para Arabian Essence
#  - Sirve el sitio estático desde la raíz del repo
#  - Habilita las funciones serverless en netlify/functions
# ============================================================

[build]
  publish   = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ============================================================
#  La home (/) sirve la versión nueva (rediseño SOLANO).
#  force=true → la muestra en la raíz aunque exista index.html,
#  sin tocar ni borrar el archivo original. Solo afecta a "/",
#  los assets y la función serverless siguen funcionando normal.
# ============================================================
[[redirects]]
  from = "/"
  to = "/arabianessencess_netlify_app_2.html"
  status = 200
  force = true
